<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerber // Inventory &amp; Production Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&family=Noto+Color+Emoji&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand">GERBER://</div>
      <div class="brand-sub">inventory &amp; production</div>
      <div class="pins" id="pinRow"></div>
    </div>
    <div class="nav" id="navList"></div>
    <div class="sidebar-footer">
      <div id="syncStatusBox" style="font-family:var(--mono);font-size:9.5px;color:var(--text-faint);text-align:center;margin-bottom:8px;">
        <span id="footStatus">connecting…</span>
      </div>
      <button class="io-btn" onclick="document.getElementById('importFile').click()">⇩ Import JSON Backup</button>
      <button class="io-btn" onclick="exportDB()">⇧ Export JSON Backup</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
    </div>
  </div>

  <div class="main">
    <div id="pages"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBody"></div>
</div>
<div class="toast-wrap" id="toastWrap"></div>

<script src="/js/vendor/chart.umd.min.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
